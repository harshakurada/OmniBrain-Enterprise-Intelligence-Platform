version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: omnibrain-backend:latest
    container_name: omnibrain_backend
    command: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/workspace
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/workspace
      - WATCHFILES_FORCE_POLLING=true # Useful for file change detection in Docker mounts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: omnibrain-frontend:latest
    container_name: omnibrain_frontend
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - .:/workspace
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/workspace
      - BACKEND_URL=http://backend:8000 # Override localhost inside docker network
    depends_on:
      backend:
        condition: service_healthy
