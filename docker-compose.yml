services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: omnibrain-backend:latest
    container_name: omnibrain_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Places the SQLite file inside the persistent `omnibrain_storage`
      # volume (mounted below) rather than the container's ephemeral
      # filesystem, so data survives `docker compose down`/recreation.
      - DATABASE_URL=sqlite:///./storage/omnibrain.db
    ports:
      - "8000:8000"
    volumes:
      - omnibrain_storage:/workspace/storage
      - omnibrain_logs:/workspace/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 1g
    cpus: 1.0

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: omnibrain-frontend:latest
    container_name: omnibrain_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Overrides localhost:8000 so the frontend container reaches the
      # backend container by its Docker network service name.
      - BACKEND_URL=http://backend:8000
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      backend:
        condition: service_healthy
    mem_limit: 512m
    cpus: 0.5

volumes:
  omnibrain_storage:
  omnibrain_logs:
